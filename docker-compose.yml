services:
  postgres:
    image: postgres:16-alpine
    container_name: rpx_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: rpx
      POSTGRES_PASSWORD: rpx
      POSTGRES_DB: rpx_expert
    ports:
      - '5432:5432'
    volumes:
      - rpx_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U rpx -d rpx_expert']
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:latest
    container_name: rpx_adminer
    restart: unless-stopped
    ports:
      - '8080:8080'
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  rpx_pgdata:
    name: rpx_pgdata
